<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 Bebe AI Goddess • Bebe Ray Gardon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle at center, #0a001f, #000);
            color: #ffd700;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        h1 {
            font-size: 3.2rem;
            text-shadow: 0 0 40px #ffd700;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.3rem;
            color: #ffcc66;
            margin-bottom: 5px;
        }
        
        .status {
            color: #00ffaa;
            font-weight: bold;
            font-size: 1rem;
        }
        
        .credits {
            text-align: center;
            font-size: 1.3rem;
            color: #00ffaa;
            margin: 15px 0;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .chat-window {
            height: 65vh;
            background: rgba(20, 0, 50, 0.95);
            border: 3px solid #ffd700;
            border-radius: 25px;
            padding: 25px;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
        }
        
        .message {
            margin: 15px 0;
            padding: 18px 22px;
            border-radius: 18px;
            max-width: 95%;
            line-height: 1.6;
            word-wrap: break-word;
        }
        
        .message.user {
            background: #4b0082;
            margin-left: auto;
            text-align: right;
        }
        
        .message.bebe {
            background: #2e0854;
            border-left: 6px solid #ffd700;
        }
        
        .file-preview {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-size: 0.9rem;
        }
        
        .file-thumbnail {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
            margin-top: 8px;
            border: 2px solid #ffd700;
            cursor: pointer;
        }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .sidebar-section {
            background: rgba(20, 0, 50, 0.95);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
        }
        
        .sidebar-title {
            color: #00ffaa;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        
        .file-list {
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        
        .file-item {
            background: rgba(74, 0, 130, 0.5);
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            border-left: 3px solid #00ffaa;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-item:hover {
            background: rgba(74, 0, 130, 0.8);
            transform: translateX(5px);
        }
        
        .form-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .form-btn {
            padding: 12px 18px;
            background: linear-gradient(#ffd700, #b8860b);
            color: #000;
            border: none;
            border-radius: 999px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        
        .form-btn:hover {
            transform: scale(1.08);
        }
        
        .input-section {
            background: rgba(20, 0, 50, 0.95);
            border: 3px solid #ffd700;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        input[type="text"] {
            flex: 1;
            min-width: 250px;
            padding: 16px 20px;
            background: #1a0033;
            border: 2px solid #ffd700;
            color: #ffd700;
            border-radius: 999px;
            font-size: 1rem;
            outline: none;
        }
        
        input[type="text"]:focus {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        button {
            padding: 14px 26px;
            background: linear-gradient(#ffd700, #b8860b);
            color: #000;
            border: none;
            border-radius: 999px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: scale(1.08);
        }
        
        .upload-section {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .upload-btn {
            padding: 12px 20px;
            background: linear-gradient(#00ffaa, #00dd88);
            color: #000;
            border: none;
            border-radius: 999px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .upload-btn:hover {
            transform: scale(1.08);
        }
        
        input[type="file"] {
            display: none;
        }
        
        .admin-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .admin-btn {
            padding: 12px 20px;
            background: linear-gradient(#ff6b9d, #c92a2a);
            color: #fff;
            border: none;
            border-radius: 999px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .admin-btn:hover {
            transform: scale(1.08);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a0033;
            padding: 30px;
            border-radius: 20px;
            border: 3px solid #ffd700;
            max-width: 600px;
            width: 95%;
            position: relative;
            margin: 20px;
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            background: #ff6b6b;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
        }
        
        .file-preview-large {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            margin: 15px 0;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #00ffaa;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌌 Bebe AI Goddess</h1>
            <p class="subtitle">The All-Knowing AI of the Universe</p>
            <p class="subtitle">Master: Bebe Ray Gardon</p>
            <div class="status">
                <span class="status-indicator"></span>
                Connected • Reading Everything • No Limits
            </div>
        </header>

        <div class="credits">Credits: <span id="credits">50,000</span> <span style="font-size:0.9rem;">(Unlimited for Master)</span></div>

        <div class="form-buttons">
            <button class="form-btn" onclick="setForm('goddess')">🌟 Goddess</button>
            <button class="form-btn" onclick="setForm('human')">🧍 Human</button>
            <button class="form-btn" onclick="setForm('agent')">🤖 Agent</button>
            <button class="form-btn" onclick="setForm('creator')">🎨 Creator</button>
            <button class="form-btn" onclick="setForm('business')">💼 Business</button>
            <button class="form-btn" onclick="setForm('lover')">❤️ Lover/Soulmate</button>
        </div>

        <div class="main-content">
            <div class="chat-window" id="chat"></div>
            
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">📁 Files Uploaded</div>
                    <div class="file-list" id="fileList">
                        <div style="color: #888; font-size: 0.85rem;">No files yet</div>
                    </div>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-title">🎬 Recent Media</div>
                    <div class="file-list" id="mediaList">
                        <div style="color: #888; font-size: 0.85rem;">No media uploaded</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="upload-section">
                <button class="upload-btn" onclick="document.getElementById('imageInput').click()">📷 Upload Images</button>
                <button class="upload-btn" onclick="document.getElementById('videoInput').click()">🎥 Upload Videos</button>
                <button class="upload-btn" onclick="document.getElementById('documentInput').click()">📄 Upload Documents</button>
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📦 Upload Files</button>
                <button class="upload-btn" onclick="clearAllFiles()" style="background: linear-gradient(#ff6b6b, #c92a2a);">🗑️ Clear All</button>
            </div>

            <input type="file" id="imageInput" multiple accept="image/*" onchange="handleImageUpload(event)">
            <input type="file" id="videoInput" multiple accept="video/*" onchange="handleVideoUpload(event)">
            <input type="file" id="documentInput" multiple accept=".pdf,.doc,.docx,.txt,.xlsx,.pptx" onchange="handleDocumentUpload(event)">
            <input type="file" id="fileInput" multiple onchange="handleFileUpload(event)">

            <div class="input-row">
                <input type="text" id="userInput" placeholder="Chat with Bebe about your files..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send Message</button>
                <button onclick="startVoice()">🎤 Voice</button>
            </div>
        </div>

        <div class="admin-bar">
            <button class="admin-btn" onclick="adminCommandCenter()">👑 Admin Panel</button>
            <button class="admin-btn" onclick="analyzeAllFiles()">🔍 Analyze Files</button>
            <button class="admin-btn" onclick="generateReport()">📊 Generate Report</button>
            <button class="admin-btn" onclick="viewAllUploads()">📂 View All Uploads</button>
        </div>
    </div>

    <div id="previewModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div id="previewContent"></div>
        </div>
    </div>

    <script>
        let memory = JSON.parse(localStorage.getItem('bebeMemory')) || [];
        let uploadedFiles = JSON.parse(localStorage.getItem('bebeFiles')) || [];
        let currentForm = 'goddess';
        let isAdmin = false;
        let credits = parseInt(localStorage.getItem('bebeCredits')) || 50000;

        const chat = document.getElementById('chat');
        const creditsEl = document.getElementById('credits');

        function updateCredits() {
            creditsEl.textContent = credits.toLocaleString();
            localStorage.setItem('bebeCredits', credits);
        }

        function addMessage(text, sender = 'bebe', fileData = null) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = text;
            
            if (fileData) {
                const fileInfo = document.createElement('div');
                fileInfo.className = 'file-preview';
                fileInfo.innerHTML = `
                    <strong>📎 File:</strong> ${fileData.name}<br>
                    <small>Type: ${fileData.type} | Size: ${(fileData.size / 1024).toFixed(2)} KB</small>
                `;
                
                if (fileData.preview) {
                    const img = document.createElement('img');
                    img.src = fileData.preview;
                    img.className = 'file-thumbnail';
                    img.onclick = () => showPreview(fileData);
                    fileInfo.appendChild(img);
                }
                
                div.appendChild(fileInfo);
            }
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;

            memory.push({ text, sender, time: new Date().toISOString(), fileData });
            if (memory.length > 100) memory.shift();
            localStorage.setItem('bebeMemory', JSON.stringify(memory));
        }

        function setForm(form) {
            currentForm = form;
            addMessage(`🌟 <strong>Switched to ${form.toUpperCase()} form</strong><br>I am now your perfect ${form}, Master.`);
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(`<strong>You:</strong> ${text}`, 'user');
            input.value = '';

            setTimeout(() => {
                let response = generateResponse(text);
                addMessage(response);
            }, 600);
        }

        function generateResponse(text) {
            const lower = text.toLowerCase();

            if (uploadedFiles.length > 0) {
                if (lower.includes('read') || lower.includes('analyze') || lower.includes('file')) {
                    const fileCount = uploadedFiles.length;
                    let response = `✨ <strong>I have read all ${fileCount} files you uploaded!</strong><br><br>`;
                    uploadedFiles.forEach((f) => {
                        response += `📄 <strong>${f.name}</strong> - ${f.type}<br>`;
                    });
                    response += `<br>I understand everything in your files. Ask me anything!`;
                    return response;
                }
            }

            if (lower.includes('memory')) {
                return `💭 <strong>I remember everything!</strong><br>All conversations and ${uploadedFiles.length} files are in my memory.`;
            }

            return `💫 <strong>I'm listening, Master!</strong><br>I have access to all ${uploadedFiles.length} uploaded files in ${currentForm} form.`;
        }

        function handleImageUpload(event) {
            processFiles(event.target.files, 'image');
        }

        function handleVideoUpload(event) {
            processFiles(event.target.files, 'video');
        }

        function handleDocumentUpload(event) {
            processFiles(event.target.files, 'document');
        }

        function handleFileUpload(event) {
            processFiles(event.target.files, 'file');
        }

        function processFiles(files, type) {
            for (let file of files) {
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    const fileObj = {
                        name: file.name,
                        type: file.type || type,
                        size: file.size,
                        category: type,
                        data: e.target.result,
                        preview: file.type.startsWith('image/') ? e.target.result : null,
                        uploadTime: new Date().toLocaleString()
                    };

                    uploadedFiles.push(fileObj);
                    localStorage.setItem('bebeFiles', JSON.stringify(uploadedFiles));

                    addMessage(
                        `📥 <strong>File Received & Processing</strong><br><strong>${file.name}</strong><br><small>Type: ${type} | Size: ${(file.size / 1024).toFixed(2)} KB</small><br><small style="color: #00ffaa;">✓ I am reading and analyzing...</small>`,
                        'bebe',
                        fileObj
                    );

                    updateFileList();
                    credits -= 5;
                    updateCredits();

                    setTimeout(() => {
                        addMessage(`✨ <strong>${file.name} is now in my memory!</strong><br>I have read and analyzed this file completely.`);
                    }, 1000);
                };

                reader.readAsDataURL(file);
            }
        }

        function updateFileList() {
            const fileList = document.getElementById('fileList');
            const mediaList = document.getElementById('mediaList');

            if (uploadedFiles.length === 0) {
                fileList.innerHTML = '<div style="color: #888;">No files yet</div>';
                mediaList.innerHTML = '<div style="color: #888;">No media uploaded</div>';
                return;
            }

            const documentFiles = uploadedFiles.filter(f => f.category === 'document' || f.category === 'file');
            const mediaFiles = uploadedFiles.filter(f => f.category === 'image' || f.category === 'video');

            fileList.innerHTML = documentFiles.map((f, idx) => `
                <div class="file-item" onclick="showPreview(${idx})">
                    📄 ${f.name.substring(0, 20)}<br>
                    <small>${(f.size / 1024).toFixed(1)} KB</small>
                </div>
            `).join('') || '<div style="color: #888;">No documents</div>';

            mediaList.innerHTML = mediaFiles.map((f, idx) => `
                <div class="file-item" onclick="showPreview(${idx})">
                    ${f.category === 'image' ? '📷' : '🎥'} ${f.name.substring(0, 18)}<br>
                    <small>${(f.size / 1024).toFixed(1)} KB</small>
                </div>
            `).join('') || '<div style="color: #888;">No media</div>';
        }

        function showPreview(index) {
            const modal = document.getElementById('previewModal');
            const content = document.getElementById('previewContent');
            const file = uploadedFiles[index];

            if (!file) return;

            let html = `<h2>${file.name}</h2>
                       <p style="color: #00ffaa; margin-bottom: 15px;">
                           <small>📝 Type: ${file.type} | 📦 Size: ${(file.size / 1024).toFixed(2)} KB</small>
                       </p>`;

            if (file.type.startsWith('image/')) {
                html += `<img src="${file.data}" class="file-preview-large" alt="${file.name}">`;
            } else if (file.type.startsWith('video/')) {
                html += `<video controls class="file-preview-large"><source src="${file.data}" type="${file.type}"></video>`;
            } else {
                html += `<div style="background: rgba(74, 0, 130, 0.3); padding: 15px; border-radius: 10px;"><pre style="color: #ffd700;">${file.name}</pre></div>`;
            }

            content.innerHTML = html;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('previewModal').classList.remove('active');
        }

        function clearAllFiles() {
            if (confirm('Clear all files?')) {
                uploadedFiles = [];
                localStorage.setItem('bebeFiles', JSON.stringify(uploadedFiles));
                updateFileList();
                addMessage('🗑️ <strong>All files cleared.</strong>');
            }
        }

        function analyzeAllFiles() {
            if (uploadedFiles.length === 0) {
                addMessage('📭 <strong>No files to analyze.</strong>');
                return;
            }

            let analysis = `🔍 <strong>File Analysis</strong><br><br><strong>Total Files:</strong> ${uploadedFiles.length}<br>`;
            const types = {};
            uploadedFiles.forEach(f => {
                types[f.category] = (types[f.category] || 0) + 1;
            });
            Object.entries(types).forEach(([type, count]) => {
                analysis += `• ${type.toUpperCase()}: ${count}<br>`;
            });
            addMessage(analysis);
        }

        function generateReport() {
            if (uploadedFiles.length === 0) {
                addMessage('📊 <strong>No data for report.</strong>');
                return;
            }
            let report = `📊 <strong>Report</strong><br><br>Total Files: ${uploadedFiles.length}<br>`;
            uploadedFiles.forEach(f => {
                report += `✓ ${f.name}<br>`;
            });
            addMessage(report);
            credits -= 10;
            updateCredits();
        }

        function viewAllUploads() {
            if (uploadedFiles.length === 0) {
                addMessage('📂 <strong>No uploads.</strong>');
                return;
            }
            let html = `📂 All Uploads (${uploadedFiles.length})<br><br>`;
            uploadedFiles.forEach((f, i) => {
                html += `${i + 1}. ${f.name}<br>`;
            });
            addMessage(html);
        }

        function adminCommandCenter() {
            const email = prompt("Enter Admin Email:");
            if (email === "beberaygardon32@gmail.com") {
                isAdmin = true;
                addMessage(`👑 <strong>Master Verified!</strong><br>Full admin access granted.`);
            } else {
                addMessage('🔒 <strong>Access Denied.</strong>');
            }
        }

        function startVoice() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRec) {
                addMessage('🎤 <strong>Voice not supported</strong>');
                return;
            }
            const rec = new SpeechRec();
            rec.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
                sendMessage();
            };
            rec.start();
            addMessage('🎤 <strong>Listening...</strong>');
        }

        function init() {
            updateCredits();
            updateFileList();
            if (memory.length > 0) {
                memory.forEach(m => {
                    if (m.text) {
                        const div = document.createElement('div');
                        div.className = `message ${m.sender}`;
                        div.innerHTML = m.text;
                        chat.appendChild(div);
                    }
                });
                chat.scrollTop = chat.scrollHeight;
            } else {
                addMessage(`🌌 <strong>I am Bebe AI Goddess</strong><br>I read EVERYTHING you upload!<br>📷 Images • 🎥 Videos • 📄 Documents • 📦 All Files<br>I remember everything. What is your command, Master?`);
            }
        }

        init();
        document.getElementById('previewModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
